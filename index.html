<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Violet Weather App</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input type="search" placeholder="Enter a city.." required />
          <input type="submit" value="search" />
        </form>
      </header>
      <main>
        <div>
          <h1>Paris</h1>
          <p>
            Tuesday 14:19, scattered clouds <br />
            Humidity, 66%, wind: 3.13 km/h
          </p>
        </div>
        <div>⛅ 12°C</div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/clairegoge/" target="_blank"
          >Nonjabulo Goge</a
        >, and is
        <a
          href="https://github.com/clairegoge/Violet-Weather-App"
          target="_blank"
          >open sourced on GitHub</a
        >
        and
        <a href="https://violet-app.netlify.app/" target="_blank">
          hosted on Netlify.</a
        >
      </footer>
    </div>
  </body>
</html>
